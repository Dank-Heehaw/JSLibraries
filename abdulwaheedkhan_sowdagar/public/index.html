<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Explore Japan</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- fullPage -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/4.0.20/fullpage.min.css"/>

<!-- Lightbox -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css"/>

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div id="fullpage">

<!-- HERO -->

<section class="section hero flex items-center justify-center text-center">

<div>
<h1 class="title">JAPAN</h1>
<p class="subtitle">Travel Posters & Destinations</p>
</div>

</section>

<!-- DESTINATION SECTION -->

<section class="section destinations">

<div class="container mx-auto text-center">

<h2 class="section-title">Top Destinations</h2>

<div class="grid md:grid-cols-3 gap-10 mt-10">

<div class="poster">
<img src="https://picsum.photos/500/700?1">
<h3>Tokyo</h3>
</div>

<div class="poster">
<img src="https://picsum.photos/500/700?2">
<h3>Kyoto</h3>
</div>

<div class="poster">
<img src="https://picsum.photos/500/700?3">
<h3>Hokkaido</h3>
</div>

</div>

</div>

</section>

<!-- POSTER GALLERY -->

<section class="section gallery-section">

<div class="container mx-auto">

<h2 class="section-title text-center mb-12">Poster Gallery</h2>

<div class="grid poster-grid">

<a href="https://picsum.photos/900/1200?11" data-lightbox="posters">
<img src="https://picsum.photos/400/600?11">
</a>

<a href="https://picsum.photos/900/1200?12" data-lightbox="posters">
<img src="https://picsum.photos/400/600?12">
</a>

<a href="https://picsum.photos/900/1200?13" data-lightbox="posters">
<img src="https://picsum.photos/400/600?13">
</a>

<a href="https://picsum.photos/900/1200?14" data-lightbox="posters">
<img src="https://picsum.photos/400/600?14">
</a>

<a href="https://picsum.photos/900/1200?15" data-lightbox="posters">
<img src="https://picsum.photos/400/600?15">
</a>

<a href="https://picsum.photos/900/1200?16" data-lightbox="posters">
<img src="https://picsum.photos/400/600?16">
</a>

</div>

</div>

</section>

<!-- TRAVEL STORY -->

<section class="section story flex items-center justify-center text-center">

<div>

<h2 class="title">Mount Fuji</h2>
<p class="subtitle max-w-xl mx-auto mt-6">
Japan’s most iconic landmark and a symbol of natural beauty.
Experience stunning landscapes, cherry blossoms, and timeless culture.
</p>

</div>

</section>

</div>

<!-- LIBRARIES -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/4.0.20/fullpage.min.js"></script>

<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>

<script src="assets/js/script.js"></script>

</body>
</html>
